<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baraka</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app">
        <div class="hero">
          <div class="eyebrow">Baraka</div>
          <h1>Stores & fashion deals</h1>
          <p class="subtitle">
            Discover store promotions, save favorites, and activate deals
            instantly.
          </p>
        </div>

        <div class="top-tabs">
          <button class="tab-btn active" onclick="showTab('storesTab', this)">
            Stores
          </button>
          <button class="tab-btn" onclick="showTab('favoritesTab', this)">
            Favorites
          </button>
          <button class="tab-btn" onclick="showTab('myDealsTab', this)">
            My Deals
          </button>
        </div>

        <div id="storesTab">
          <div id="homeView">
            <div id="stores"></div>
          </div>

          <div id="storeView" class="hidden">
            <button class="back-btn" onclick="goHome()">← Back</button>

            <div id="storeDetails"></div>

            <div class="toolbar">
              <input id="searchInput" placeholder="Search products..." />
              <select id="sortSelect" onchange="reloadCurrentStore()">
                <option value="default">Sort</option>
                <option value="cheap">Price ↑</option>
                <option value="expensive">Price ↓</option>
                <option value="views">Popular</option>
                <option value="discount">Best discount</option>
              </select>
            </div>

            <div id="categoryFilters"></div>
            <div id="products"></div>
          </div>
        </div>

        <div id="favoritesTab" class="hidden">
          <div id="favorites"></div>
        </div>

        <div id="myDealsTab" class="hidden">
          <div id="myDeals"></div>
        </div>
      </div>
    </div>

    <div id="qrModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">×</span>
        <div id="qrContent"></div>
      </div>
    </div>

    <div id="toast"></div>

    <div id="bottomBar" class="bottom-bar hidden">
      <span id="selectedCount">0 selected</span>
      <button onclick="activateStore()">Activate</button>
    </div>

    <div id="bottomBar" class="bottom-bar hidden">
      <div class="bottom-bar-left">
        <div class="bottom-bar-title">Selected items</div>
        <div class="bottom-bar-count" id="selectedCount">0 selected</div>
      </div>
      <button class="bottom-bar-btn" onclick="activateStore()">Activate</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
