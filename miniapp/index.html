<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baraka</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app">
        <div class="hero">
          <div class="eyebrow">Baraka Mini App</div>
          <h1>Discover local style deals worth leaving home for.</h1>
          <p class="subtitle">
            Browse curated drops, save standout pieces, and activate one QR for
            your whole in-store pickup.
          </p>
        </div>

        <div class="top-tabs">
          <button class="tab-btn active" onclick="showTab('storesTab', this)">
            Stores
          </button>
          <button class="tab-btn" onclick="showTab('favoritesTab', this)">
            Favorites
          </button>
          <button class="tab-btn" onclick="showTab('myDealsTab', this)">
            My Deals
          </button>
        </div>

        <div id="storesTab">
          <div id="homeView">
            <div id="stores"></div>
          </div>

          <div id="storeView" class="hidden">
            <button class="back-btn" onclick="goHome()">Back to stores</button>

            <div id="storeDetails"></div>

            <div class="toolbar">
              <input id="searchInput" placeholder="Search products..." />
              <select id="sortSelect" onchange="reloadCurrentStore()">
                <option value="default">Sort</option>
                <option value="cheap">Price low to high</option>
                <option value="expensive">Price high to low</option>
                <option value="views">Popular</option>
                <option value="discount">Best discount</option>
              </select>
            </div>

            <div id="categoryFilters"></div>
            <div id="products"></div>
          </div>
        </div>

        <div id="favoritesTab" class="hidden">
          <div id="favorites"></div>
        </div>

        <div id="myDealsTab" class="hidden">
          <div id="myDeals"></div>
        </div>
      </div>
    </div>

    <div id="qrModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div id="qrContent"></div>
      </div>
    </div>

    <div id="toast"></div>

    <div id="bottomBar" class="bottom-bar hidden">
      <div class="bottom-bar-left">
        <div class="bottom-bar-label">Selected items</div>
        <div class="bottom-bar-count" id="selectedCount">0 items</div>
      </div>

      <button class="bottom-bar-btn" onclick="activateStore()">Activate</button>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
