<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baraka Admin</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 90, 60, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at top right,
            rgba(255, 170, 90, 0.14),
            transparent 28%
          ),
          linear-gradient(180deg, #f8f8fb 0%, #f1f2f6 100%);
        color: #111;
        min-height: 100vh;
      }

      .app {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .hero {
        margin-bottom: 22px;
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(14px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        font-size: 12px;
        color: #666;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 0;
        color: #666;
        line-height: 1.5;
        font-size: 15px;
      }

      .card {
        position: relative;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 24px;
        padding: 20px;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
        margin-bottom: 18px;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.4),
          rgba(255, 255, 255, 0.05)
        );
        pointer-events: none;
      }

      .card > * {
        position: relative;
        z-index: 1;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 22px;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        font: inherit;
        background: rgba(255, 255, 255, 0.85);
        outline: none;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      button {
        width: 100%;
        padding: 14px 16px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #ff5a3c, #ff7d4d);
        color: white;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(255, 90, 60, 0.22);
      }

      .danger {
        background: rgba(17, 17, 17, 0.92);
        box-shadow: 0 12px 24px rgba(17, 17, 17, 0.14);
        margin-top: 10px;
      }

      .edit {
        background: rgba(255, 255, 255, 0.85);
        color: #111;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        margin-top: 10px;
      }

      .list-item {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 22px;
        padding: 18px;
        margin-bottom: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      }

      .mini {
        color: #666;
        font-size: 14px;
        line-height: 1.6;
      }

      img.preview {
        width: 100%;
        max-width: 180px;
        border-radius: 16px;
        margin-top: 10px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="hero">
        <div class="eyebrow">Baraka Admin</div>
        <h1>Manage stores and products</h1>
        <p class="subtitle">
          Create, edit and delete stores and fashion products.
        </p>
      </div>

      <div class="card">
        <h2 id="storeFormTitle">Add Store</h2>
        <input type="hidden" id="editStoreId" />
        <input id="storeName" placeholder="Store name" />
        <textarea
          id="storeDescription"
          placeholder="Store description"
        ></textarea>
        <input id="storeLocation" placeholder="Location" />
        <input id="storeAddress" placeholder="Full address" />
        <input id="storeCoverImage" placeholder="Cover image URL" />
        <input id="storeLogo" placeholder="Logo URL" />
        <button onclick="saveStore()">Save Store</button>
      </div>

      <div class="card">
        <h2 id="productFormTitle">Add Product</h2>
        <input type="hidden" id="editProductId" />
        <select id="productStoreId"></select>
        <input id="productTitle" placeholder="Product title" />
        <textarea
          id="productDescription"
          placeholder="Product description"
        ></textarea>
        <input
          id="productCategory"
          placeholder="Category (Dress, Shoes, Jacket...)"
        />
        <input id="productPrice" placeholder="New price" />
        <input id="productOldPrice" placeholder="Old price" />
        <input id="productSizes" placeholder="Sizes, example: S, M, L, XL" />
        <input id="productQuantity" placeholder="Quantity" />
        <input
          id="productExpirationDate"
          placeholder="Expiration date (YYYY-MM-DD)"
        />
        <input id="productImage" placeholder="Product image URL" />
        <button onclick="saveProduct()">Save Product</button>
      </div>

      <div class="card">
        <h2>All Stores</h2>
        <div id="storeList"></div>
      </div>

      <div class="card">
        <h2>All Products</h2>
        <div id="productList"></div>
      </div>
    </div>

    <script>
      const API_BASE = "https://baraka-backend-71az.onrender.com";

      let storesCache = [];
      let productsCache = [];

      async function saveStore() {
        const editId = document.getElementById("editStoreId").value;

        const payload = {
          name: document.getElementById("storeName").value,
          description: document.getElementById("storeDescription").value,
          location: document.getElementById("storeLocation").value,
          address: document.getElementById("storeAddress").value,
          coverImage: document.getElementById("storeCoverImage").value,
          logo: document.getElementById("storeLogo").value,
        };

        if (editId) {
          await fetch(`${API_BASE}/api/stores/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          await fetch(`${API_BASE}/api/stores`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        resetStoreForm();
        await loadAll();
      }

      async function saveProduct() {
        const editId = document.getElementById("editProductId").value;

        const payload = {
          storeId: document.getElementById("productStoreId").value,
          title: document.getElementById("productTitle").value,
          description: document.getElementById("productDescription").value,
          category: document.getElementById("productCategory").value,
          price: Number(document.getElementById("productPrice").value),
          oldPrice: Number(document.getElementById("productOldPrice").value),
          sizes: document.getElementById("productSizes").value,
          remainingQuantity: Number(
            document.getElementById("productQuantity").value,
          ),
          expirationDate: document.getElementById("productExpirationDate")
            .value,
          image: document.getElementById("productImage").value,
        };

        if (editId) {
          await fetch(`${API_BASE}/api/products/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          await fetch(`${API_BASE}/api/products`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        resetProductForm();
        await loadAll();
      }

      function resetStoreForm() {
        document.getElementById("editStoreId").value = "";
        document.getElementById("storeFormTitle").textContent = "Add Store";
        document.getElementById("storeName").value = "";
        document.getElementById("storeDescription").value = "";
        document.getElementById("storeLocation").value = "";
        document.getElementById("storeAddress").value = "";
        document.getElementById("storeCoverImage").value = "";
        document.getElementById("storeLogo").value = "";
      }

      function resetProductForm() {
        document.getElementById("editProductId").value = "";
        document.getElementById("productFormTitle").textContent = "Add Product";
        document.getElementById("productTitle").value = "";
        document.getElementById("productDescription").value = "";
        document.getElementById("productCategory").value = "";
        document.getElementById("productPrice").value = "";
        document.getElementById("productOldPrice").value = "";
        document.getElementById("productSizes").value = "";
        document.getElementById("productQuantity").value = "";
        document.getElementById("productExpirationDate").value = "";
        document.getElementById("productImage").value = "";
      }

      function editStore(id) {
        const store = storesCache.find((s) => s._id === id);
        if (!store) return;

        document.getElementById("editStoreId").value = store._id;
        document.getElementById("storeFormTitle").textContent = "Edit Store";
        document.getElementById("storeName").value = store.name || "";
        document.getElementById("storeDescription").value =
          store.description || "";
        document.getElementById("storeLocation").value = store.location || "";
        document.getElementById("storeAddress").value = store.address || "";
        document.getElementById("storeCoverImage").value =
          store.coverImage || "";
        document.getElementById("storeLogo").value = store.logo || "";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function editProduct(id) {
        const product = productsCache.find((p) => p._id === id);
        if (!product) return;

        document.getElementById("editProductId").value = product._id;
        document.getElementById("productFormTitle").textContent =
          "Edit Product";
        document.getElementById("productStoreId").value = product.storeId || "";
        document.getElementById("productTitle").value = product.title || "";
        document.getElementById("productDescription").value =
          product.description || "";
        document.getElementById("productCategory").value =
          product.category || "";
        document.getElementById("productPrice").value = product.price || "";
        document.getElementById("productOldPrice").value =
          product.oldPrice || "";
        document.getElementById("productSizes").value = (
          product.sizes || []
        ).join(", ");
        document.getElementById("productQuantity").value =
          product.remainingQuantity || "";
        document.getElementById("productExpirationDate").value =
          product.expirationDate || "";
        document.getElementById("productImage").value = product.image || "";
        window.scrollTo({ top: 240, behavior: "smooth" });
      }

      async function loadStoresToSelect() {
        const res = await fetch(`${API_BASE}/api/stores`);
        const stores = await res.json();
        storesCache = stores;

        const select = document.getElementById("productStoreId");
        select.innerHTML = "";

        stores.forEach((store) => {
          const option = document.createElement("option");
          option.value = store._id;
          option.textContent = store.name;
          select.appendChild(option);
        });
      }

      async function loadStoreList() {
        const list = document.getElementById("storeList");
        list.innerHTML = "";

        storesCache.forEach((store) => {
          const item = document.createElement("div");
          item.className = "list-item";

          item.innerHTML = `
            <strong>${store.name}</strong><br>
            <span class="mini">${store.location}</span><br>
            <span class="mini">${store.address}</span><br>
            <span class="mini">Products: ${store.productCount}</span><br>
            ${store.coverImage ? `<img class="preview" src="${store.coverImage}" alt="${store.name}">` : ""}
            <button class="edit" onclick="editStore('${store._id}')">Edit Store</button>
            <button class="danger" onclick="deleteStore('${store._id}')">Delete Store</button>
          `;

          list.appendChild(item);
        });
      }

      async function loadProductList() {
        const productList = document.getElementById("productList");
        productList.innerHTML = "";
        productsCache = [];

        const storeMap = {};
        storesCache.forEach((s) => {
          storeMap[s._id] = s.name;
        });

        for (const store of storesCache) {
          const res = await fetch(`${API_BASE}/api/stores/${store._id}`);
          const data = await res.json();

          data.products.forEach((product) => {
            productsCache.push(product);

            const item = document.createElement("div");
            item.className = "list-item";

            item.innerHTML = `
              <strong>${product.title}</strong><br>
              <span class="mini">Store: ${storeMap[product.storeId] || "-"}</span><br>
              <span class="mini">Category: ${product.category || "-"}</span><br>
              <span class="mini">Price: $${product.price} <span style="text-decoration:line-through;color:#777;">$${product.oldPrice}</span></span><br>
              <span class="mini">Sizes: ${(product.sizes || []).join(", ")}</span><br>
              <span class="mini">Quantity: ${product.remainingQuantity}</span><br>
              <span class="mini">Views: ${product.views}</span><br>
              <span class="mini">Expires: ${product.expirationDate || "-"}</span><br>
              ${product.image ? `<img class="preview" src="${product.image}" alt="${product.title}">` : ""}
              <button class="edit" onclick="editProduct('${product._id}')">Edit Product</button>
              <button class="danger" onclick="deleteProduct('${product._id}')">Delete Product</button>
            `;

            productList.appendChild(item);
          });
        }
      }

      async function deleteStore(id) {
        await fetch(`${API_BASE}/api/stores/${id}`, {
          method: "DELETE",
        });
        await loadAll();
      }

      async function deleteProduct(id) {
        await fetch(`${API_BASE}/api/products/${id}`, {
          method: "DELETE",
        });
        await loadAll();
      }

      async function loadAll() {
        await loadStoresToSelect();
        await loadStoreList();
        await loadProductList();
      }

      loadAll();
    </script>
  </body>
</html>
