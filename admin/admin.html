<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baraka Admin</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 500px;
        margin: 40px auto;
        padding: 20px;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 12px;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        background: #ff5a3c;
        color: white;
        font-weight: bold;
        border-radius: 12px;
        cursor: pointer;
      }

      .msg {
        margin-top: 14px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Baraka Admin</h1>

    <input id="title" placeholder="Title" />
    <input id="store" placeholder="Store" />
    <input id="price" placeholder="Price" />
    <input id="oldPrice" placeholder="Old Price" />
    <input id="quantity" placeholder="Quantity" />
    <input id="image" placeholder="Image URL" />

    <button onclick="addDeal()">Add Deal</button>

    <div class="msg" id="msg"></div>

    <h2 style="margin-top: 30px">All Deals</h2>
    <div id="dealList"></div>

    <script>
      async function addDeal() {
        const payload = {
          title: document.getElementById("title").value,
          store: document.getElementById("store").value,
          price: Number(document.getElementById("price").value),
          oldPrice: Number(document.getElementById("oldPrice").value),
          remainingQuantity: Number(document.getElementById("quantity").value),
          image: document.getElementById("image").value,
        };

        const res = await fetch("http://localhost:5000/api/deals", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        document.getElementById("msg").textContent =
          "Deal added: " + data.title;
        loadDeals();
      }

      async function loadDeals() {
        const res = await fetch("http://localhost:5000/api/deals");
        const deals = await res.json();

        const list = document.getElementById("dealList");
        list.innerHTML = "";

        deals.forEach((deal) => {
          const item = document.createElement("div");
          item.style.border = "1px solid #ddd";
          item.style.padding = "12px";
          item.style.marginBottom = "12px";
          item.style.borderRadius = "12px";

          item.innerHTML = `
        <strong>${deal.title}</strong><br>
        Store: ${deal.store}<br>
        Price: $${deal.price} <span style="text-decoration:line-through;color:#777;">$${deal.oldPrice}</span><br>
        Quantity left: ${deal.remainingQuantity}<br>
        Views: ${deal.views}<br><br>
        <button onclick="deleteDeal('${deal._id}')" style="background:#111;color:white;padding:8px 12px;border:none;border-radius:8px;cursor:pointer;">
          Delete
        </button>
      `;

          list.appendChild(item);
        });
      }

      async function deleteDeal(id) {
        await fetch(`http://localhost:5000/api/deals/${id}`, {
          method: "DELETE",
        });

        loadDeals();
      }

      loadDeals();
    </script>
  </body>
</html>
