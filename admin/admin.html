<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baraka Admin</title>
    <script src="config.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 90, 60, 0.18),
            transparent 30%
          ),
          radial-gradient(
            circle at top right,
            rgba(255, 170, 90, 0.14),
            transparent 28%
          ),
          linear-gradient(180deg, #f8f8fb 0%, #f1f2f6 100%);
        color: #111;
        min-height: 100vh;
      }

      .app {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .hero {
        margin-bottom: 22px;
      }

      .eyebrow {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(14px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        font-size: 12px;
        color: #666;
        margin-bottom: 12px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 0;
        color: #666;
        line-height: 1.5;
        font-size: 15px;
      }

      .card {
        position: relative;
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(18px);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 24px;
        padding: 20px;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.06),
          inset 0 1px 0 rgba(255, 255, 255, 0.7);
        margin-bottom: 18px;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.4),
          rgba(255, 255, 255, 0.05)
        );
        pointer-events: none;
      }

      .card > * {
        position: relative;
        z-index: 1;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 22px;
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 16px;
        border: 1px solid rgba(0, 0, 0, 0.08);
        font: inherit;
        background: rgba(255, 255, 255, 0.85);
        outline: none;
      }

      textarea {
        min-height: 100px;
        resize: vertical;
      }

      button {
        width: 100%;
        padding: 14px 16px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #ff5a3c, #ff7d4d);
        color: white;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(255, 90, 60, 0.22);
      }

      .danger {
        background: rgba(17, 17, 17, 0.92);
        box-shadow: 0 12px 24px rgba(17, 17, 17, 0.14);
        margin-top: 10px;
      }

      .edit {
        background: rgba(255, 255, 255, 0.85);
        color: #111;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        margin-top: 10px;
      }

      .list-item {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 22px;
        padding: 18px;
        margin-bottom: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
      }

      .mini {
        color: #666;
        font-size: 14px;
        line-height: 1.6;
      }

      img.preview {
        width: 100%;
        max-width: 180px;
        border-radius: 16px;
        margin-top: 10px;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="hero">
        <div class="eyebrow">Baraka Admin</div>
        <h1>Manage stores and products</h1>
        <p class="subtitle">
          Create, edit and delete stores and fashion products.
        </p>
      </div>

      <div class="card">
        <h2 id="storeFormTitle">Add Store</h2>
        <input type="hidden" id="editStoreId" />
        <input id="storeName" placeholder="Store name" />
        <textarea
          id="storeDescription"
          placeholder="Store description"
        ></textarea>
        <input id="storeLocation" placeholder="Location" />
        <input id="storeAddress" placeholder="Full address" />
        <input id="storeCoverImage" placeholder="Cover image URL" />
        <input id="storeLogo" placeholder="Logo URL" />
        <button onclick="saveStore()">Save Store</button>
      </div>

      <div class="card">
        <h2 id="productFormTitle">Add Product</h2>
        <input type="hidden" id="editProductId" />
        <select id="productStoreId"></select>
        <input id="productTitle" placeholder="Product title" />
        <textarea
          id="productDescription"
          placeholder="Product description"
        ></textarea>
        <input
          id="productCategory"
          placeholder="Category (Dress, Shoes, Jacket...)"
        />
        <input id="productPrice" placeholder="New price" />
        <input id="productOldPrice" placeholder="Old price" />
        <input id="productSizes" placeholder="Sizes, example: S, M, L, XL" />
        <input id="productQuantity" placeholder="Quantity" />
        <input
          id="productExpirationDate"
          placeholder="Expiration date (YYYY-MM-DD)"
        />
        <input id="productImage" placeholder="Product image URL" />
        <button onclick="saveProduct()">Save Product</button>
      </div>

      <div class="card">
        <h2>All Stores</h2>
        <div id="storeList"></div>
      </div>

      <div class="card">
        <h2>All Products</h2>
        <div id="productList"></div>
      </div>

      <div class="card">
        <h2>Redeem History</h2>
        <select id="activationStatusFilter">
          <option value="all">All statuses</option>
          <option value="active">Active</option>
          <option value="redeemed">Redeemed</option>
          <option value="expired">Expired</option>
        </select>
        <select id="activationStoreFilter">
          <option value="all">All stores</option>
        </select>
        <input
          id="activationSearch"
          placeholder="Search by store, Telegram ID or username"
        />
        <button onclick="setupBotWebhook()" style="margin-bottom: 10px">
          Enable Telegram Bot
        </button>
        <button onclick="loadActivationHistory()" style="margin-bottom: 14px">
          Refresh History
        </button>
        <div id="activationList"></div>
      </div>

      <div class="card">
        <h2>Merchant Accounts</h2>
        <select id="merchantStoreId"></select>
        <input id="merchantLogin" placeholder="Merchant login" />
        <input id="merchantPassword" placeholder="Merchant password" />
        <button onclick="saveMerchantAccount()" style="margin-bottom: 14px">
          Save Merchant Account
        </button>
        <div id="merchantAccountList"></div>
      </div>

      <div class="card">
        <h2>Audit Log</h2>
        <button onclick="loadAuditLogs()" style="margin-bottom: 14px">
          Refresh Audit Log
        </button>
        <div id="auditLogList"></div>
      </div>
    </div>

    <script>
      const API_BASE =
        window.APP_CONFIG?.API_BASE || "https://baraka-backend-71az.onrender.com";
      const ADMIN_KEY_STORAGE = "baraka-admin-api-key";

      let storesCache = [];
      let productsCache = [];
      let activationsCache = [];
      let merchantAccountsCache = [];
      let auditLogsCache = [];

      function getAdminKey() {
        let key = localStorage.getItem(ADMIN_KEY_STORAGE) || "";

        if (!key) {
          key = prompt("Enter admin access key");
          if (key) {
            localStorage.setItem(ADMIN_KEY_STORAGE, key.trim());
          }
        }

        return (key || "").trim();
      }

      async function apiFetch(path, options = {}) {
        const adminKey = getAdminKey();

        if (!adminKey) {
          throw new Error("Admin key is required");
        }

        const headers = {
          ...(options.headers || {}),
          "x-api-key": adminKey,
        };

        const response = await fetch(`${API_BASE}${path}`, {
          ...options,
          headers,
        });

        if (response.status === 401) {
          localStorage.removeItem(ADMIN_KEY_STORAGE);
          alert("Admin key is invalid. Enter it again.");
        }

        return response;
      }

      async function saveStore() {
        const editId = document.getElementById("editStoreId").value;

        const payload = {
          name: document.getElementById("storeName").value,
          description: document.getElementById("storeDescription").value,
          location: document.getElementById("storeLocation").value,
          address: document.getElementById("storeAddress").value,
          coverImage: document.getElementById("storeCoverImage").value,
          logo: document.getElementById("storeLogo").value,
        };

        if (editId) {
          await apiFetch(`/api/stores/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          await apiFetch("/api/stores", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        resetStoreForm();
        await loadAll();
      }

      async function saveProduct() {
        const editId = document.getElementById("editProductId").value;

        const payload = {
          storeId: document.getElementById("productStoreId").value,
          title: document.getElementById("productTitle").value,
          description: document.getElementById("productDescription").value,
          category: document.getElementById("productCategory").value,
          price: Number(document.getElementById("productPrice").value),
          oldPrice: Number(document.getElementById("productOldPrice").value),
          sizes: document.getElementById("productSizes").value,
          remainingQuantity: Number(
            document.getElementById("productQuantity").value,
          ),
          expirationDate: document.getElementById("productExpirationDate")
            .value,
          image: document.getElementById("productImage").value,
        };

        if (editId) {
          await apiFetch(`/api/products/${editId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } else {
          await apiFetch("/api/products", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        }

        resetProductForm();
        await loadAll();
      }

      function resetStoreForm() {
        document.getElementById("editStoreId").value = "";
        document.getElementById("storeFormTitle").textContent = "Add Store";
        document.getElementById("storeName").value = "";
        document.getElementById("storeDescription").value = "";
        document.getElementById("storeLocation").value = "";
        document.getElementById("storeAddress").value = "";
        document.getElementById("storeCoverImage").value = "";
        document.getElementById("storeLogo").value = "";
      }

      function resetProductForm() {
        document.getElementById("editProductId").value = "";
        document.getElementById("productFormTitle").textContent = "Add Product";
        document.getElementById("productTitle").value = "";
        document.getElementById("productDescription").value = "";
        document.getElementById("productCategory").value = "";
        document.getElementById("productPrice").value = "";
        document.getElementById("productOldPrice").value = "";
        document.getElementById("productSizes").value = "";
        document.getElementById("productQuantity").value = "";
        document.getElementById("productExpirationDate").value = "";
        document.getElementById("productImage").value = "";
      }

      function editStore(id) {
        const store = storesCache.find((s) => s._id === id);
        if (!store) return;

        document.getElementById("editStoreId").value = store._id;
        document.getElementById("storeFormTitle").textContent = "Edit Store";
        document.getElementById("storeName").value = store.name || "";
        document.getElementById("storeDescription").value =
          store.description || "";
        document.getElementById("storeLocation").value = store.location || "";
        document.getElementById("storeAddress").value = store.address || "";
        document.getElementById("storeCoverImage").value =
          store.coverImage || "";
        document.getElementById("storeLogo").value = store.logo || "";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function editProduct(id) {
        const product = productsCache.find((p) => p._id === id);
        if (!product) return;

        document.getElementById("editProductId").value = product._id;
        document.getElementById("productFormTitle").textContent =
          "Edit Product";
        document.getElementById("productStoreId").value = product.storeId || "";
        document.getElementById("productTitle").value = product.title || "";
        document.getElementById("productDescription").value =
          product.description || "";
        document.getElementById("productCategory").value =
          product.category || "";
        document.getElementById("productPrice").value = product.price || "";
        document.getElementById("productOldPrice").value =
          product.oldPrice || "";
        document.getElementById("productSizes").value = (
          product.sizes || []
        ).join(", ");
        document.getElementById("productQuantity").value =
          product.remainingQuantity || "";
        document.getElementById("productExpirationDate").value =
          product.expirationDate || "";
        document.getElementById("productImage").value = product.image || "";
        window.scrollTo({ top: 240, behavior: "smooth" });
      }

      async function loadStoresToSelect() {
        const res = await fetch(`${API_BASE}/api/stores`);
        const stores = await res.json();
        storesCache = stores;

        ["productStoreId", "merchantStoreId", "activationStoreFilter"].forEach(
          (selectId) => {
            const select = document.getElementById(selectId);
            if (!select) return;

            const keepAllOption = selectId === "activationStoreFilter";
            select.innerHTML = keepAllOption
              ? `<option value="all">All stores</option>`
              : "";

            stores.forEach((store) => {
              const option = document.createElement("option");
              option.value = store._id;
              option.textContent = store.name;
              select.appendChild(option);
            });
          },
        );
      }

      async function loadStoreList() {
        const list = document.getElementById("storeList");
        list.innerHTML = "";

        storesCache.forEach((store) => {
          const item = document.createElement("div");
          item.className = "list-item";

          item.innerHTML = `
            <strong>${store.name}</strong><br>
            <span class="mini">${store.location}</span><br>
            <span class="mini">${store.address}</span><br>
            <span class="mini">Products: ${store.productCount}</span><br>
            ${store.coverImage ? `<img class="preview" src="${store.coverImage}" alt="${store.name}">` : ""}
            <button class="edit" onclick="editStore('${store._id}')">Edit Store</button>
            <button class="danger" onclick="deleteStore('${store._id}')">Delete Store</button>
          `;

          list.appendChild(item);
        });
      }

      async function loadProductList() {
        const productList = document.getElementById("productList");
        productList.innerHTML = "";
        productsCache = [];

        const storeMap = {};
        storesCache.forEach((s) => {
          storeMap[s._id] = s.name;
        });

        for (const store of storesCache) {
          const res = await fetch(`${API_BASE}/api/stores/${store._id}`);
          const data = await res.json();

          data.products.forEach((product) => {
            productsCache.push(product);

            const item = document.createElement("div");
            item.className = "list-item";

            item.innerHTML = `
              <strong>${product.title}</strong><br>
              <span class="mini">Store: ${storeMap[product.storeId] || "-"}</span><br>
              <span class="mini">Category: ${product.category || "-"}</span><br>
              <span class="mini">Price: $${product.price} <span style="text-decoration:line-through;color:#777;">$${product.oldPrice}</span></span><br>
              <span class="mini">Sizes: ${(product.sizes || []).join(", ")}</span><br>
              <span class="mini">Quantity: ${product.remainingQuantity}</span><br>
              <span class="mini">Views: ${product.views}</span><br>
              <span class="mini">Expires: ${product.expirationDate || "-"}</span><br>
              ${product.image ? `<img class="preview" src="${product.image}" alt="${product.title}">` : ""}
              <button class="edit" onclick="editProduct('${product._id}')">Edit Product</button>
              <button class="danger" onclick="deleteProduct('${product._id}')">Delete Product</button>
            `;

            productList.appendChild(item);
          });
        }
      }

      function getActivationStatus(activation) {
        if (activation.redeemed) return "redeemed";
        if (Date.now() > Number(activation.expiresAt)) return "expired";
        return "active";
      }

      function renderActivationHistory() {
        const activationList = document.getElementById("activationList");
        const statusFilter =
          document.getElementById("activationStatusFilter").value;
        const storeFilter = document.getElementById("activationStoreFilter").value;
        const search = document
          .getElementById("activationSearch")
          .value.toLowerCase()
          .trim();

        const filtered = activationsCache.filter((activation) => {
          const status = getActivationStatus(activation);

          if (statusFilter !== "all" && status !== statusFilter) {
            return false;
          }

          if (storeFilter !== "all" && activation.storeId !== storeFilter) {
            return false;
          }

          if (!search) return true;

          const haystack = [
            activation.storeName || "",
            activation.telegramId || "",
            activation.userFirstName || "",
            activation.username || "",
            activation._id || "",
          ]
            .join(" ")
            .toLowerCase();

          return haystack.includes(search);
        });

        activationList.innerHTML = "";

        if (!filtered.length) {
          activationList.innerHTML = `<div class="mini">No matching activations.</div>`;
          return;
        }

        filtered.forEach((activation) => {
          const item = document.createElement("div");
          item.className = "list-item";

          const status = getActivationStatus(activation);
          const statusLabel =
            status === "redeemed"
              ? "Redeemed"
              : status === "expired"
                ? "Expired"
                : "Active";

          item.innerHTML = `
            <strong>${activation.storeName || "Store not found"}</strong><br>
            <span class="mini">Status: ${statusLabel}</span><br>
            <span class="mini">Telegram ID: ${activation.telegramId}</span><br>
            <span class="mini">User: ${activation.userFirstName || "-"} ${activation.username ? `(@${activation.username})` : ""}</span><br>
            <span class="mini">Products count: ${(activation.productIds || []).length}</span><br>
            <span class="mini">Activated: ${activation.activatedAt ? new Date(activation.activatedAt).toLocaleString() : "-"}</span><br>
            <span class="mini">Expires: ${activation.expiresAt ? new Date(Number(activation.expiresAt)).toLocaleString() : "-"}</span><br>
            <span class="mini">Redeemed at: ${activation.redeemedAt ? new Date(activation.redeemedAt).toLocaleString() : "-"}</span><br>
            <span class="mini">Activation ID: ${activation._id}</span>
          `;

          activationList.appendChild(item);
        });
      }

      async function loadActivationHistory() {
        const activationList = document.getElementById("activationList");
        activationList.innerHTML = "Loading...";

        const res = await apiFetch("/api/admin/activations");
        const activations = await res.json();
        activationsCache = Array.isArray(activations) ? activations : [];

        renderActivationHistory();
      }

      async function saveMerchantAccount() {
        const storeId = document.getElementById("merchantStoreId").value;
        const login = document.getElementById("merchantLogin").value.trim();
        const password = document.getElementById("merchantPassword").value.trim();

        if (!storeId || !login || !password) {
          alert("Store, login and password are required.");
          return;
        }

        const res = await apiFetch("/api/admin/merchant-accounts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ storeId, login, password }),
        });
        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        document.getElementById("merchantLogin").value = "";
        document.getElementById("merchantPassword").value = "";
        await loadMerchantAccounts();
      }

      async function loadMerchantAccounts() {
        const list = document.getElementById("merchantAccountList");
        list.innerHTML = "Loading...";

        const res = await apiFetch("/api/admin/merchant-accounts");
        const data = await res.json();
        merchantAccountsCache = Array.isArray(data) ? data : [];

        list.innerHTML = "";

        if (!merchantAccountsCache.length) {
          list.innerHTML = `<div class="mini">No merchant accounts yet.</div>`;
          return;
        }

        merchantAccountsCache.forEach((account) => {
          const item = document.createElement("div");
          item.className = "list-item";
          item.innerHTML = `
            <strong>${account.storeName}</strong><br>
            <span class="mini">Login: ${account.login}</span><br>
            <span class="mini">Status: ${account.isActive ? "Active" : "Disabled"}</span><br>
            <span class="mini">Updated: ${account.updatedAt ? new Date(account.updatedAt).toLocaleString() : "-"}</span>
          `;
          list.appendChild(item);
        });
      }

      async function loadAuditLogs() {
        const list = document.getElementById("auditLogList");
        list.innerHTML = "Loading...";

        const res = await apiFetch("/api/admin/audit-logs");
        const data = await res.json();
        auditLogsCache = Array.isArray(data) ? data : [];

        list.innerHTML = "";

        if (!auditLogsCache.length) {
          list.innerHTML = `<div class="mini">No audit entries yet.</div>`;
          return;
        }

        auditLogsCache.forEach((entry) => {
          const item = document.createElement("div");
          item.className = "list-item";
          item.innerHTML = `
            <strong>${entry.action}</strong><br>
            <span class="mini">Actor: ${entry.actorType} / ${entry.actorId || "-"}</span><br>
            <span class="mini">Entity: ${entry.entityType} / ${entry.entityId || "-"}</span><br>
            <span class="mini">At: ${entry.createdAt ? new Date(entry.createdAt).toLocaleString() : "-"}</span><br>
            <span class="mini">Data: ${JSON.stringify(entry.metadata || {})}</span>
          `;
          list.appendChild(item);
        });
      }

      async function setupBotWebhook() {
        const res = await apiFetch("/api/admin/bot/set-webhook", {
          method: "POST",
        });
        const data = await res.json();

        if (data.error) {
          alert(data.error);
          return;
        }

        alert(`Telegram bot enabled.\nWebhook: ${data.webhookUrl}`);
      }

      async function deleteStore(id) {
        await apiFetch(`/api/stores/${id}`, {
          method: "DELETE",
        });
        await loadAll();
      }

      async function deleteProduct(id) {
        await apiFetch(`/api/products/${id}`, {
          method: "DELETE",
        });
        await loadAll();
      }

      async function loadAll() {
        await loadStoresToSelect();
        await loadStoreList();
        await loadProductList();
        await loadActivationHistory();
        await loadMerchantAccounts();
        await loadAuditLogs();
      }

      document
        .getElementById("activationStatusFilter")
        .addEventListener("change", renderActivationHistory);
      document
        .getElementById("activationStoreFilter")
        .addEventListener("change", renderActivationHistory);
      document
        .getElementById("activationSearch")
        .addEventListener("input", renderActivationHistory);

      loadAll();
    </script>
  </body>
</html>
